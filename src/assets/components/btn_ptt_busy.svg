<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" width="360" height="130">
  <title>PTT BUSY</title>

      <defs>
        <linearGradient id="grad-idle" x1="0" y1="0" x2="0" y2="1">
