name: NextVWT CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Validate & Test (CI)
  # Runs on every push and PR to main/master
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate & Test (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # [FIX P1-4a] Node 18 sudah EOL (April 2025) → upgrade ke Node 20 LTS
      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # [FIX P1-4b] pnpm 8 → pnpm 9 (versi LTS terbaru)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # [FIX P1-4c] --no-frozen-lockfile berbahaya di CI → gunakan --frozen-lockfile
      # Ini memastikan lock file dipatuhi dan build bersifat deterministic/reproducible
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm run format:check

      - name: Run code linter
        run: pnpm run lint

      - name: Run TypeScript type check
        run: pnpm run type-check

      - name: Run Unit Tests
        run: pnpm run test -- --coverage

      - name: Run Integration Tests (Hybrid Flow)
        run: pnpm run test:integration

      - name: Build Web Application
        run: pnpm run build

      # [BONUS P2] E2E Playwright Tests — jalankan di CI setelah build sukses
      # Hanya pada push ke main (bukan PR) untuk menghemat build minutes
      - name: Install Playwright Browsers
        if: github.event_name == 'push'
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E Tests (Playwright)
        if: github.event_name == 'push'
        run: pnpm run test:e2e:playwright
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Run E2E Tests (Cypress)
        if: github.event_name == 'push'
        run: pnpm run test:e2e:cypress
        env:
          CYPRESS_VERIFY_TIMEOUT: 120000

      - name: Upload Playwright Report (on E2E failure)
        if: failure() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright Test Results (on E2E failure)
        if: failure() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Sign Android (CD)
  # Hanya berjalan pada push ke branch utama (bukan pull request)
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build & Sign Android (CD)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # [FIX P1-4a] Node 20 LTS konsisten dengan job validate
      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # [FIX P1-4b] pnpm 9 konsisten dengan job validate
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # [FIX P1-4c] --frozen-lockfile untuk build deterministik
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Web Application
        run: pnpm run build

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Warning: ANDROID_KEYSTORE_BASE64 is not set. Building unsigned release."
          else
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          fi

      - name: Build Android Release Binaries
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          if [ -f "app/release.keystore" ]; then
            echo "Building signed release binaries..."
            ./gradlew bundleRelease assembleRelease \
              -PRELEASE_STORE_FILE=release.keystore \
              -PRELEASE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
              -PRELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
              -PRELEASE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
          else
            echo "Keystore file not found. Building unsigned release binaries..."
            ./gradlew bundleRelease assembleRelease
          fi

      # Hapus keystore sementara setelah build — security best practice
      - name: Clean up temporary keystore file
        if: always()
        run: |
          rm -f android/app/release.keystore

      # [FIX] Tambahkan retention-days untuk artifact management
      - name: Upload Android App Bundle (AAB) Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30
