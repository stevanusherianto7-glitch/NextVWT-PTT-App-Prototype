name: NextVWT CI/CD Pipeline

on:
  # Trigger otomatis saat push ke branch manapun yang relevan
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'refactor/**'

  # Trigger otomatis saat PR ke branch utama
  pull_request:
    branches:
      - main
      - master
      - develop

  # Trigger MANUAL via GitHub Actions UI atau gh CLI
  # Ini yang dibutuhkan untuk menjalankan pipeline tanpa push
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Jalankan E2E Playwright tests?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      run_android:
        description: 'Build Android APK/AAB?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      debug_mode:
        description: 'Enable verbose logging?'
        required: false
        default: false
        type: boolean

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Validate & Test (CI)
  # Runs on every push and PR to target branches
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate & Test (CI)
    runs-on: ubuntu-latest
    env:
      # Supabase — gunakan placeholder jika secret belum diset
      # Unit test tidak membutuhkan koneksi Supabase real
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable__placeholder_for_ci' }}
      VITE_TURN_URL: ${{ secrets.VITE_TURN_URL || 'turn:127.0.0.1:3478' }}
      VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME || 'ci-test-user' }}
      VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL || 'ci-test-pass' }}
      # CI flag untuk Vitest dan Playwright
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # [FIX P1-4b] pnpm dipasang sebelum setup-node agar setup-node bisa mendeteksi pnpm untuk caching
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # [FIX P1-4a] Node 22 LTS terbaru
      # Menggunakan cache bawaan (native cache: 'pnpm') dari setup-node
      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # [FIX P1-4c] --no-frozen-lockfile berbahaya di CI → gunakan --frozen-lockfile
      # Ini memastikan lock file dipatuhi dan build bersifat deterministic/reproducible
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm run format:check

      - name: Run code linter
        run: pnpm run lint

      - name: Run TypeScript type check
        run: pnpm run type-check

      - name: Run Unit Tests
        run: pnpm run test -- --coverage

      - name: Run Integration Tests (Hybrid Flow)
        run: pnpm run test:integration

      - name: Build Web Application
        run: pnpm run build

      # [BONUS P2] E2E Playwright Tests — jalankan di CI setelah build sukses
      # Dijalankan pada push dan PR untuk validasi penuh
      - name: Install Playwright Browsers
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true')
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E Tests (Playwright)
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true')
        run: pnpm run test:e2e:playwright
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload Playwright Report (on E2E failure)
        if: |
          always() && (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true')
          )
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright Test Results (on E2E failure)
        if: |
          always() && (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true')
          )
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Sign Android (CD)
  # Hanya berjalan pada push ke branch utama (bukan pull request)
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build & Sign Android (CD)
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # [FIX P1-4b] pnpm 9 konsisten dengan job validate
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # [FIX P1-4a] Node 22 LTS konsisten dengan job validate
      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # [FIX P1-4c] --frozen-lockfile untuk build deterministik
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Web Application
        run: pnpm run build

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Warning: ANDROID_KEYSTORE_BASE64 is not set. Building unsigned release."
          else
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          fi

      - name: Build Android Release Binaries
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          if [ -f "app/release.keystore" ]; then
            echo "Building signed release binaries..."
            ./gradlew bundleRelease assembleRelease \
              -PRELEASE_STORE_FILE=release.keystore \
              -PRELEASE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
              -PRELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
              -PRELEASE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
          else
            echo "Keystore file not found. Building unsigned release binaries..."
            ./gradlew bundleRelease assembleRelease
          fi

      # Hapus keystore sementara setelah build — security best practice
      - name: Clean up temporary keystore file
        if: always()
        run: |
          rm -f android/app/release.keystore

      # [FIX] Tambahkan retention-days untuk artifact management
      - name: Upload Android App Bundle (AAB) Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30
